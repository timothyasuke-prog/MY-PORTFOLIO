<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const isLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);
      const visitEndpoint = isLocal
        ? "http://localhost:5000/api/visit"
        : `${window.location.origin}/api/visit`;
      const sendVisitPing = () => {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(visitEndpoint);
          return;
        }
        fetch(visitEndpoint, { method: "POST", keepalive: true }).catch(() => {});
      };
      window.addEventListener("load", sendVisitPing);
    </script>
  </body>
</html>
